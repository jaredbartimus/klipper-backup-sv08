# =============================================================================
# SV08 Pre-Level Gantry Macro
# =============================================================================
# Purpose:
#   Coarsely levels the gantry before QUAD_GANTRY_LEVEL (QGL) so the Eddy
#   NG eddy-current probe is not dangerously far from the bed at any corner.
#
#   The SV08 uses four independent Z motors (z, z1, z2, z3).  If the gantry
#   is badly twisted the eddy probe may be >3 mm out of range at a corner
#   before QGL has a chance to measure it, causing a probe error or a crash.
#
#   This macro:
#     1. Homes all axes (skipped if already homed).
#     2. Moves to each QGL screw position and takes a single probe reading.
#     3. Calculates the deviation of each corner from the average Z.
#     4. Drives each Z stepper individually via SET_KINEMATIC_POSITION +
#        FORCE_MOVE to compensate.
#     5. Optionally calls QUAD_GANTRY_LEVEL automatically.
#
# Usage:
#   PRE_LEVEL_GANTRY            ; coarse level only
#   PRE_LEVEL_GANTRY AUTO=1     ; coarse level then run QGL automatically
#
# Installation:
#   1. Copy this file to your Klipper config directory.
#   2. Add [include sv08_pre_level.cfg] to printer.cfg.
#   3. Make sure [force_move] enable_force_move: true is present in printer.cfg
#      (see note below).
#   4. Verify the PROBE_POINTS below match your quad_gantry_level screw
#      positions (check your printer.cfg [quad_gantry_level] section).
#
# Requirements in printer.cfg:
#   [force_move]
#   enable_force_move: true
# =============================================================================

# -----------------------------------------------------------------------------
# User-tunable parameters (edit these to match YOUR SV08 config)
# -----------------------------------------------------------------------------
# QGL screw positions for a stock SV08 (X, Y at each corner screw).
# These should match the points: in your [quad_gantry_level] section.
# Default SV08 QGL points (centre of each leadscrew):
#   Front-Left  (z  stepper): 60,  60
#   Front-Right (z1 stepper): 300, 60
#   Rear-Right  (z2 stepper): 300, 300
#   Rear-Left   (z3 stepper): 60,  300
#
# The probe is offset from the nozzle, so actual toolhead XY will be adjusted
# automatically using the probe offsets defined in [probe] / [beacon] etc.
#
# PROBE_Z_HEIGHT : Z height to move to before probing each corner (should be
#                  safely above bed but low enough for the eddy probe, ~5 mm).
# MAX_DEVIATION  : If any corner deviates more than this (mm) after correction
#                  a warning is printed but the macro continues.
# -----------------------------------------------------------------------------

[gcode_macro PRE_LEVEL_GANTRY]
description: Coarsely level the SV08 gantry so the eddy probe is in range at all corners before QGL
gcode:
    # ------------------------------------------------------------------ #
    # Parameters
    # ------------------------------------------------------------------ #
    {% set AUTO_QGL     = params.AUTO|default(0)|int %}
    {% set PROBE_HEIGHT = params.PROBE_Z|default(5)|float %}   # mm above bed when probing
    {% set SPEED        = params.SPEED|default(150)|float %}   # mm/s travel speed
    {% set PROBE_SPEED  = params.PROBE_SPEED|default(5)|float %}
    {% set MAX_DEV_WARN = params.MAX_DEV|default(2.0)|float %}  # warn if correction > this

    # Stock SV08 QGL screw XY positions (toolhead coords, not probe coords).
    # The macro applies probe XY offset automatically.
    {% set CORNERS = [
        {'name': 'front_left',  'stepper': 'stepper_z',  'x':  60, 'y':  60},
        {'name': 'front_right', 'stepper': 'stepper_z1', 'x': 300, 'y':  60},
        {'name': 'rear_right',  'stepper': 'stepper_z2', 'x': 300, 'y': 300},
        {'name': 'rear_left',   'stepper': 'stepper_z3', 'x':  60, 'y': 300},
    ] %}

    # ------------------------------------------------------------------ #
    # 0. Save current state
    # ------------------------------------------------------------------ #
    SAVE_GCODE_STATE NAME=pre_level_state

    # ------------------------------------------------------------------ #
    # 1. Home if needed
    # ------------------------------------------------------------------ #
    {% if not 'xyz' in printer.toolhead.homed_axes %}
        { action_respond_info("PRE_LEVEL_GANTRY: Homing all axes...") }
        G28
    {% else %}
        { action_respond_info("PRE_LEVEL_GANTRY: Already homed, skipping G28.") }
    {% endif %}

    # Lift to safe height before travelling
    G90
    G1 Z{PROBE_HEIGHT + 10} F600

    # ------------------------------------------------------------------ #
    # 2. Probe each corner and store Z readings
    # ------------------------------------------------------------------ #
    { action_respond_info("PRE_LEVEL_GANTRY: Probing 4 corners...") }

    {% set z_readings = [] %}

    {% for c in CORNERS %}
        # Apply probe XY offset so the probe lands over the screw, not the nozzle
        {% set probe_x = c.x - printer.configfile.config.probe.x_offset|default(0)|float %}
        {% set probe_y = c.y - printer.configfile.config.probe.y_offset|default(0)|float %}

        # Clamp to bed limits
        {% set probe_x = [probe_x, printer.toolhead.axis_minimum.x + 1]|max %}
        {% set probe_x = [probe_x, printer.toolhead.axis_maximum.x - 1]|min %}
        {% set probe_y = [probe_y, printer.toolhead.axis_minimum.y + 1]|max %}
        {% set probe_y = [probe_y, printer.toolhead.axis_maximum.y - 1]|min %}

        G1 X{probe_x} Y{probe_y} F{SPEED * 60}
        G1 Z{PROBE_HEIGHT} F600

        PROBE
        {% set z_val = printer.probe.last_z_result %}
        { action_respond_info("PRE_LEVEL_GANTRY:  %s  Z=%.4f" % (c.name, z_val)) }
        {% set _ = z_readings.append(z_val) %}

        G1 Z{PROBE_HEIGHT + 5} F600
    {% endfor %}

    # ------------------------------------------------------------------ #
    # 3. Calculate average and per-corner deviation
    # ------------------------------------------------------------------ #
    {% set z_sum = z_readings[0] + z_readings[1] + z_readings[2] + z_readings[3] %}
    {% set z_avg = z_sum / 4 %}
    { action_respond_info("PRE_LEVEL_GANTRY: Average Z = %.4f mm" % z_avg) }

    {% set deviations = [] %}
    {% for z in z_readings %}
        {% set _ = deviations.append(z - z_avg) %}
    {% endfor %}

    # ------------------------------------------------------------------ #
    # 4. Move to centre, then apply per-stepper corrections
    # ------------------------------------------------------------------ #
    G1 X180 Y180 F{SPEED * 60}
    G1 Z{PROBE_HEIGHT + 15} F600

    { action_respond_info("PRE_LEVEL_GANTRY: Applying corrections...") }

    {% for i in range(4) %}
        {% set c   = CORNERS[i] %}
        {% set dev = deviations[i] %}

        {% if dev|abs > 0.02 %}
            { action_respond_info("PRE_LEVEL_GANTRY:  %s  correction = %+.4f mm" % (c.name, dev * -1)) }

            # Move only this stepper by the deviation amount (inverted)
            # Positive dev  → corner is HIGH → lower it (negative move)
            # Negative dev  → corner is LOW  → raise it (positive move)
            FORCE_MOVE STEPPER={c.stepper} DISTANCE={dev * -1} VELOCITY=5 ACCEL=10

        {% else %}
            { action_respond_info("PRE_LEVEL_GANTRY:  %s  within tolerance (%.4f mm), no adjustment." % (c.name, dev)) }
        {% endif %}

        {% if dev|abs > MAX_DEV_WARN %}
            { action_respond_info("PRE_LEVEL_GANTRY: WARNING – large correction at %s (%.2f mm). Check mechanicals." % (c.name, dev|abs)) }
        {% endif %}
    {% endfor %}

    # ------------------------------------------------------------------ #
    # 5. Re-home Z so Klipper's position tracking is clean
    # ------------------------------------------------------------------ #
    { action_respond_info("PRE_LEVEL_GANTRY: Re-homing Z after corrections...") }
    G28 Z

    # ------------------------------------------------------------------ #
    # 6. Optionally run the full QGL
    # ------------------------------------------------------------------ #
    {% if AUTO_QGL %}
        { action_respond_info("PRE_LEVEL_GANTRY: Running QUAD_GANTRY_LEVEL...") }
        QUAD_GANTRY_LEVEL
        G28 Z
    {% else %}
        { action_respond_info("PRE_LEVEL_GANTRY: Done. Run QUAD_GANTRY_LEVEL when ready.") }
    {% endif %}

    # ------------------------------------------------------------------ #
    # 7. Restore state
    # ------------------------------------------------------------------ #
    RESTORE_GCODE_STATE NAME=pre_level_state MOVE=0


# =============================================================================
# Convenience wrapper: full pre-level → QGL → re-home sequence
# =============================================================================
[gcode_macro SAFE_QGL]
description: Pre-level gantry then run a full QUAD_GANTRY_LEVEL
gcode:
    PRE_LEVEL_GANTRY AUTO=1


# =============================================================================
# Optional: slot this into your START_PRINT macro
# =============================================================================
# In your existing START_PRINT (or PRINT_START) macro, replace the bare
# QUAD_GANTRY_LEVEL call with:
#
#   PRE_LEVEL_GANTRY AUTO=1
#
# or just:
#
#   SAFE_QGL
#
# This ensures every print starts with a safely-levelled gantry.
# =============================================================================