# =============================================================================
# SV08 Pre-Level Gantry Macro  (Eddy NG / probe_eddy_current compatible)
# =============================================================================
# Coarsely levels the gantry before QUAD_GANTRY_LEVEL so the Eddy NG probe
# is never dangerously far from the bed at any corner.
#
# HOW IT WORKS
#   1. Homes all axes if not already homed.
#   2. Travels to each of the 4 QGL screw positions and probes Z.
#   3. Calculates each corner's deviation from the average Z.
#   4. Uses FORCE_MOVE to nudge each Z stepper independently.
#   5. Re-homes Z, then optionally runs QUAD_GANTRY_LEVEL.
#
# USAGE
#   PRE_LEVEL_GANTRY            – coarse level only
#   PRE_LEVEL_GANTRY AUTO=1     – coarse level, then QGL automatically
#   SAFE_QGL                    – shorthand for PRE_LEVEL_GANTRY AUTO=1
#
# INSTALLATION
#   1. Place this file in your Klipper config directory.
#   2. Add to printer.cfg:
#        [include sv08_pre_level.cfg]
#
#        [force_move]
#        enable_force_move: true
#   3. Edit the PROBE OFFSET variables below to match your machine.
#
# WHY NOT READ OFFSETS FROM printer.configfile?
#   The Eddy NG registers as [probe_eddy_ng btt_eddy], not [probe].
#   Klipper's Jinja2 cannot safely traverse config dicts with dynamic keys
#   at macro evaluation time, so offsets are hardcoded as plain variables.
#   Copy x_offset / y_offset from your [probe_eddy_ng btt_eddy] section.
# =============================================================================


# =============================================================================
# Variable storage – lets the helper macro pass probe results back to the
# main macro across separate gcode command boundaries.
# =============================================================================
[gcode_macro _PLG_VARS]
variable_z0: 0.0
variable_z1: 0.0
variable_z2: 0.0
variable_z3: 0.0
gcode:
    # intentionally empty


# =============================================================================
# Internal helper: probe at current XY and store the Z result
# =============================================================================
[gcode_macro _PLG_PROBE_CORNER]
description: Internal helper for PRE_LEVEL_GANTRY – do not call directly
gcode:
    {% set SLOT   = params.SLOT|int %}
    {% set HEIGHT = params.HEIGHT|default(5)|float %}

    G1 Z{HEIGHT} F600
    PROBE
    # Read result from the probe_eddy_ng btt_eddy object.
    # If you ever rename your probe section, update this key to match.
    {% set z = printer['probe_eddy_ng btt_eddy'].last_z_result %}
    SET_GCODE_VARIABLE MACRO=_PLG_VARS VARIABLE=z{SLOT} VALUE={z}
    { action_respond_info("PRE_LEVEL_GANTRY: slot %d  Z = %.4f mm" % (SLOT, z)) }
    G1 Z{HEIGHT + 5} F600


# =============================================================================
# Main macro
# =============================================================================
[gcode_macro PRE_LEVEL_GANTRY]
description: Coarsely level SV08 gantry before QGL so the Eddy NG probe is in range
gcode:

    # ------------------------------------------------------------------
    # *** EDIT THESE TO MATCH YOUR MACHINE ***
    #
    # Copy x_offset / y_offset from your [probe_eddy_ng btt_eddy] section.
    # Stock SV08 Eddy NG is typically x_offset: -24  y_offset: 0
    # but check your actual config to be sure.
    # ------------------------------------------------------------------
    {% set PROBE_X_OFFSET = -24.0 %}
    {% set PROBE_Y_OFFSET =   0.0 %}

    # QGL screw positions (nozzle XY directly over each leadscrew nut).
    # Verify against the points: list in your [quad_gantry_level] section.
    #   Slot 0 = front_left   stepper_z
    #   Slot 1 = front_right  stepper_z1
    #   Slot 2 = rear_right   stepper_z2
    #   Slot 3 = rear_left    stepper_z3
    {% set SCREW_X  = [ 60, 300, 300,  60] %}
    {% set SCREW_Y  = [ 60,  60, 300, 300] %}
    {% set STEPPERS = ['stepper_z', 'stepper_z1', 'stepper_z2', 'stepper_z3'] %}
    {% set NAMES    = ['front_left', 'front_right', 'rear_right', 'rear_left'] %}

    # ------------------------------------------------------------------
    # Runtime parameters (override on the command line if needed)
    # ------------------------------------------------------------------
    {% set AUTO_QGL     = params.AUTO|default(0)|int %}
    {% set PROBE_HEIGHT = params.PROBE_Z|default(5)|float %}
    {% set TRAVEL_SPEED = params.SPEED|default(150)|float %}
    {% set MAX_DEV_WARN = params.MAX_DEV|default(2.0)|float %}

    SAVE_GCODE_STATE NAME=pre_level_state

    # ------------------------------------------------------------------
    # 1. Home if needed
    # ------------------------------------------------------------------
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        { action_respond_info("PRE_LEVEL_GANTRY: Homing all axes...") }
        G28
    {% else %}
        { action_respond_info("PRE_LEVEL_GANTRY: Already homed, skipping G28.") }
    {% endif %}

    G90
    G1 Z{PROBE_HEIGHT + 15} F600

    # ------------------------------------------------------------------
    # 2. Probe each corner
    #
    # We delegate the actual PROBE + result-capture to _PLG_PROBE_CORNER.
    # This is necessary because Jinja2 evaluates the entire macro body
    # at parse time; calling a sub-macro forces Klipper to execute PROBE
    # and update printer.probe.last_z_result before the next evaluation.
    # ------------------------------------------------------------------
    { action_respond_info("PRE_LEVEL_GANTRY: Probing 4 corners...") }

    {% for i in range(4) %}
        {% set px = SCREW_X[i] - PROBE_X_OFFSET %}
        {% set py = SCREW_Y[i] - PROBE_Y_OFFSET %}
        {% set px = [px, printer.toolhead.axis_minimum.x + 2]|max %}
        {% set px = [px, printer.toolhead.axis_maximum.x - 2]|min %}
        {% set py = [py, printer.toolhead.axis_minimum.y + 2]|max %}
        {% set py = [py, printer.toolhead.axis_maximum.y - 2]|min %}
        G1 X{px} Y{py} F{TRAVEL_SPEED * 60}
        _PLG_PROBE_CORNER SLOT={i} HEIGHT={PROBE_HEIGHT}
    {% endfor %}

    # ------------------------------------------------------------------
    # 3. Read stored results and calculate deviations
    # ------------------------------------------------------------------
    {% set z0 = printer['gcode_macro _PLG_VARS'].z0 %}
    {% set z1 = printer['gcode_macro _PLG_VARS'].z1 %}
    {% set z2 = printer['gcode_macro _PLG_VARS'].z2 %}
    {% set z3 = printer['gcode_macro _PLG_VARS'].z3 %}
    {% set z_avg = (z0 + z1 + z2 + z3) / 4.0 %}

    { action_respond_info("PRE_LEVEL_GANTRY: FL=%.4f  FR=%.4f  RR=%.4f  RL=%.4f  avg=%.4f" % (z0, z1, z2, z3, z_avg)) }

    {% set deviations = [z0 - z_avg, z1 - z_avg, z2 - z_avg, z3 - z_avg] %}

    # ------------------------------------------------------------------
    # 4. Move to centre, apply per-stepper corrections via FORCE_MOVE
    # ------------------------------------------------------------------
    G1 X180 Y180 F{TRAVEL_SPEED * 60}
    G1 Z{PROBE_HEIGHT + 20} F600

    { action_respond_info("PRE_LEVEL_GANTRY: Applying corrections...") }

    {% for i in range(4) %}
        {% set dev = deviations[i] %}
        {% if dev|abs > 0.02 %}
            { action_respond_info("PRE_LEVEL_GANTRY:  %-12s  %+.4f mm" % (NAMES[i], dev * -1)) }
            FORCE_MOVE STEPPER={STEPPERS[i]} DISTANCE={dev * -1} VELOCITY=3 ACCEL=5
        {% else %}
            { action_respond_info("PRE_LEVEL_GANTRY:  %-12s  within tolerance (%.4f mm)" % (NAMES[i], dev)) }
        {% endif %}
        {% if dev|abs > MAX_DEV_WARN %}
            { action_respond_info("PRE_LEVEL_GANTRY: *** WARNING: large correction at %s (%.2f mm) – check mechanicals ***" % (NAMES[i], dev|abs)) }
        {% endif %}
    {% endfor %}

    # ------------------------------------------------------------------
    # 5. Re-home Z to resync Klipper's position tracking
    # ------------------------------------------------------------------
    { action_respond_info("PRE_LEVEL_GANTRY: Re-homing Z to resync position...") }
    G28 Z

    # ------------------------------------------------------------------
    # 6. Optionally run full QGL
    # ------------------------------------------------------------------
    {% if AUTO_QGL %}
        { action_respond_info("PRE_LEVEL_GANTRY: Running QUAD_GANTRY_LEVEL...") }
        QUAD_GANTRY_LEVEL
        G28 Z
        { action_respond_info("PRE_LEVEL_GANTRY: Complete.") }
    {% else %}
        { action_respond_info("PRE_LEVEL_GANTRY: Coarse level done. Run QUAD_GANTRY_LEVEL when ready.") }
    {% endif %}

    RESTORE_GCODE_STATE NAME=pre_level_state MOVE=0


# =============================================================================
# Convenience wrapper
# =============================================================================
[gcode_macro SAFE_QGL]
description: Coarse pre-level + full QUAD_GANTRY_LEVEL
gcode:
    PRE_LEVEL_GANTRY AUTO=1